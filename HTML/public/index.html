<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khatme Qadirya</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F2027">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Gulzar&display=swap" rel="stylesheet">
    <style>
        :root { --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364); --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.1); --gold: #FFD700; --text-main: #ffffff; --text-muted: #cfcfcf; --btn-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); --danger: #ef4444; --special-bg: rgba(255, 215, 0, 0.1); }
        @font-face { font-family: 'Al Qalam Quran'; src: url('Al Qalam Quran Majeed Web Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Jameel Noori Nastaleeq'; src: url('Jameel Noori Nastaleeq Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Jameel Noori Nastaleeq Kasheeda'; src: url('Jameel Noori Nastaleeq Kasheeda.ttf') format('truetype'); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-gradient); margin: 0; min-height: 100vh; color: var(--text-main); display: block; padding: 20px 0; overflow-y: auto; -webkit-overflow-scrolling: touch; user-select: none; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        .font-arabic { font-family: 'Al Qalam Quran', serif; line-height: 1.8; }
        .font-urdu { font-family: 'Jameel Noori Nastaleeq', serif; font-size: 1.8rem !important; line-height: 2.2 !important; }
        #live-visitor-badge { position: fixed; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(56, 239, 125, 0.3); padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 8px; z-index: 100; backdrop-filter: blur(5px); }
        .live-dot { width: 8px; height: 8px; background-color: #38ef7d; border-radius: 50%; box-shadow: 0 0 10px #38ef7d; animation: blink 2s infinite; }
        .live-text { font-size: 0.85rem; color: #fff; font-weight: 500; }
        .status-disconnected .live-dot { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        #settings-badge { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; backdrop-filter: blur(5px); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); width: 90%; max-width: 500px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; margin: 20px auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        h1 { margin: 0 0 30px 0; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .input-field { width: 80%; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; text-align: center; margin-bottom: 15px; outline: none; }
        .home-btn { width: 100%; padding: 20px; margin: 10px 0; border-radius: 20px; font-size: 1.2rem; font-weight: bold; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); color: white; cursor: pointer; transition: 0.2s; }
        .home-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .home-btn.primary { background: var(--btn-gradient); border: none; color: white; text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .session-list { width: 100%; margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
        .session-item { background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .session-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.15); }
        .join-badge { background: var(--btn-gradient); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .zikr-header { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .zikr-badge { background: var(--gold); color: #0F2027; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Al Qalam Quran', serif; font-size: 1.6rem; font-weight: bold; margin-bottom: -22px; z-index: 10; border: 3px solid #0F2027; }
        .title-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 30px 20px 15px 20px; width: 100%; position: relative; }
        .zikr-title { font-family: 'Gulzar', serif; font-size: 2.0rem; color: #ffffff; line-height: 1.6; margin-bottom: 5px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .zikr-subtitle { font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        #zikr-body-container { width: 100%; min-height: 100px; margin-bottom: 20px; padding: 10px; text-align: center; }
        #arabic-body { font-size: 2.0rem; line-height: 1.6; color: #ffffff; margin-bottom: 15px; direction: rtl; white-space: pre-wrap; user-select: text; text-align: center; }
        .progress-container { position: relative; width: 160px; height: 160px; margin-bottom: 25px; flex-shrink: 0; }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .counter-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 700; }
        .target-label { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; color: #aaa; }
        #tap-btn { width: 100%; background: var(--btn-gradient); color: white; border: none; padding: 20px; font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(56, 239, 125, 0.2); transition: transform 0.1s; }
        #tap-btn:active { transform: scale(0.96); }
        #tap-btn:disabled { background: #4b5563; box-shadow: none; }
        .pulsing { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(56, 239, 125, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0); } }
        #status-msg { margin-top: 15px; min-height: 30px; font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        #admin-panel { display: none; margin-top: 20px; width: 100%; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .admin-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: bold; min-width: 120px; }
        .btn-restart { background: #ff9f43 !important; color: #fff !important; width: 100%; flex: 100%; margin-top: 10px; }
        .btn-end { background: var(--danger) !important; color: #fff !important; width: 100%; flex: 100%; margin-top: 5px; }
        .btn-share { background: #0984e3 !important; color: white !important; width: 100%; margin-top: 5px; }
        #custom-modal, #password-modal, #instruction-modal, #settings-modal, #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1a262f; border: 1px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        #reading-container { display: none; margin-top: 10px; width: 100%; height: 60vh; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,215,0,0.2); }
        .reading-text { font-family: 'Al Qalam Quran', serif; font-size: 1.8rem; line-height: 2.0; color: #fff; text-align: center; white-space: pre-wrap; direction: rtl; }
    </style>
</head>
<body>
<div id="live-visitor-badge"><div class="live-dot"></div><div class="live-text"><span id="live-count">1</span> Online</div></div>
<div id="settings-badge" onclick="showSettings()">⚙️</div>

<div class="glass-card" id="landing-screen">
    <h1>Khatme Qadirya</h1>
    <p style="color:#ccc; margin-bottom:30px;">Live Global Zikr Session</p>
    <button class="home-btn primary" onclick="showCreateScreen()">CREATE GROUP</button>
    <button class="home-btn" onclick="showJoinScreen()">JOIN GROUP</button>
</div>

<div class="glass-card hidden" id="create-screen">
    <button class="back-btn" onclick="showLandingScreen()">&larr; Back</button>
    <h1>Create Group</h1>
    <input type="text" id="create-name" class="input-field" placeholder="Group Name" />
    <input type="password" id="create-pass" class="input-field" placeholder="Set Password (Optional)" />
    <button class="home-btn primary" onclick="createSession()">START SESSION</button>
</div>

<div class="glass-card hidden" id="join-screen">
    <button class="back-btn" onclick="showLandingScreen()">&larr; Back</button>
    <h1>Join Group</h1>
    <input type="text" id="search-input" class="input-field" placeholder="Search Groups..." onkeyup="filterSessions()" />
    <div id="sessions-list" class="session-list"><div style="color:#666;">Searching for active sessions...</div></div>
</div>

<div class="glass-card hidden" id="app-screen">
    <div style="font-size:0.8rem; color:#aaa; margin-bottom:10px;" id="session-title-display"></div>
    <h1>Khatme Qadirya</h1>
    <div class="zikr-header">
        <div class="zikr-badge" id="zikr-num">1</div>
        <div class="title-box">
            <div class="zikr-title" id="zikr-title-urdu">Loading...</div>
            <div class="zikr-subtitle" id="zikr-title-eng">Connecting</div>
        </div>
    </div>
    <div id="zikr-body-container">
        <div id="arabic-body">...</div>
    </div>
    <div class="progress-container" id="progress-wrapper">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="70" cx="80" cy="80"/>
            <circle class="progress-ring__circle" stroke="#FFD700" stroke-width="8" stroke-linecap="round" fill="transparent" r="70" cx="80" cy="80"/>
        </svg>
        <div class="counter-text" id="count-display">0</div>
        <div class="target-label" id="target-display">Target: 111</div>
    </div>
    <div id="reading-container"><div class="reading-text" id="reading-content"></div></div>
    <button id="tap-btn" class="pulsing" onclick="handleUserTap()">TAP</button>
    <div id="status-msg"></div>
    
    <div id="admin-panel">
        <div class="admin-controls">
            <button class="admin-btn" style="color:#ff6b6b" onclick="showModal('reset')">Reset</button>
            <button class="admin-btn" style="color:#4ecdc4" onclick="showModal('next')">Next >></button>
            <button class="admin-btn btn-restart" onclick="showModal('restart')">Restart</button>
            <button class="admin-btn btn-end" onclick="showModal('end')">End</button>
            <button class="admin-btn btn-share" onclick="shareSession()">🔗 Share Link</button>
        </div>
    </div>
</div>

<div id="loading-overlay"><div style="color:white; font-size:1.5rem;">Joining Session...</div></div>
<div id="settings-modal"><div class="modal-content"><h3 style="color:var(--gold);">Settings</h3><button id="vib-toggle-btn" class="home-btn" onclick="toggleVibration()">Vibration: ON</button><button class="home-btn" onclick="document.getElementById('settings-modal').style.display='none'">Close</button></div></div>
<div id="custom-modal"><div class="modal-content"><h3 id="modal-text" style="color:white;">Confirm?</h3><button class="home-btn primary" id="modal-confirm-btn">Yes</button><button class="home-btn" onclick="closeModal()">Cancel</button></div></div>
<div id="password-modal"><div class="modal-content"><h3>Enter Password</h3><input type="password" id="join-pass-input" class="input-field" /><button class="home-btn primary" onclick="submitJoin()">Join</button><button class="home-btn" onclick="closePassModal()">Cancel</button></div></div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script>
    const socket = io({ transports: ['websocket'], upgrade: false });
    let currentSessionId = null, currentSessionPass = "", pendingAction = null;
    let availableSessions = [], selectedSessionIdForJoin = null;
    let vibrationEnabled = localStorage.getItem('vib') !== 'false';

    const circle = document.querySelector('.progress-ring__circle');
    const radius = 70, circumference = radius * 2 * Math.PI;
    if(circle) { circle.style.strokeDasharray = `${circumference} ${circumference}`; circle.style.strokeDashoffset = circumference; }

    function hideAll() { 
        ['landing-screen', 'create-screen', 'join-screen', 'app-screen'].forEach(id => document.getElementById(id).classList.add('hidden')); 
    }

    socket.on('joinedSession', (data) => { 
        document.getElementById('loading-overlay').style.display = 'none';
        currentSessionId = data.sessionId;
        localStorage.setItem('kq_session', currentSessionId);
        if(data.adminToken) localStorage.setItem('kq_admin', data.adminToken);
        
        hideAll();
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('session-title-display').innerText = "Session: " + data.state.sessionName;
        
        // UI SECURITY: Only show panel if data says you are admin
        document.getElementById('admin-panel').style.display = data.isAdmin ? 'block' : 'none';
        updateUI(data.state); 
    });

    function createSession() {
        const name = document.getElementById('create-name').value.trim() || "Khatm Session";
        const password = document.getElementById('create-pass').value.trim();
        currentSessionPass = password;
        socket.emit('createSession', { name, password });
    }

    function updateUI(data) {
        if (!data.zikr) return;
        document.getElementById('zikr-num').innerText = data.zikr.id;
        document.getElementById('zikr-title-urdu').innerText = data.zikr.titleUrdu;
        document.getElementById('zikr-title-eng').innerText = data.zikr.titleEng;
        
        if(data.zikr.type === 'read') {
            document.getElementById('progress-wrapper').style.display = 'none';
            document.getElementById('tap-btn').style.display = 'none';
            document.getElementById('reading-container').style.display = 'block';
            document.getElementById('reading-content').innerText = data.zikr.bodyText;
        } else {
            document.getElementById('progress-wrapper').style.display = 'block';
            document.getElementById('tap-btn').style.display = 'block';
            document.getElementById('reading-container').style.display = 'none';
            const body = document.getElementById('arabic-body');
            body.innerText = data.zikr.bodyText;
            body.className = data.zikr.font === 'urdu' ? 'font-urdu' : 'font-arabic';
        }

        document.getElementById('count-display').innerText = data.currentCount;
        document.getElementById('target-display').innerText = "Target: " + data.target;
        
        if(circle) {
            const offset = circumference - (Math.min(data.currentCount / data.target, 1) * circumference);
            circle.style.strokeDashoffset = offset;
        }

        const tapBtn = document.getElementById('tap-btn');
        if (data.isFinished) {
            tapBtn.disabled = true; tapBtn.innerText = "Target Reached"; tapBtn.classList.remove('pulsing');
        } else {
            tapBtn.disabled = false; tapBtn.innerText = "TAP"; tapBtn.classList.add('pulsing');
        }
    }

    socket.on('updateState', updateUI);
    socket.on('sessionError', (msg) => { alert(msg); location.reload(); });
    function handleUserTap() { socket.emit('increment', currentSessionId); }
    function showModal(action) { pendingAction = action; document.getElementById('custom-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
    document.getElementById('modal-confirm-btn').onclick = () => {
        socket.emit(pendingAction === 'next' ? 'nextZikr' : pendingAction === 'reset' ? 'resetCurrent' : pendingAction === 'restart' ? 'restartSession' : 'endSession', currentSessionId);
        closeModal();
    };
    
    function shareSession() {
        const url = `${window.location.origin}/?join=${currentSessionId}&pass=${currentSessionPass}`;
        navigator.clipboard.writeText(url).then(() => alert("Link Copied!"));
    }

    function showCreateScreen() { hideAll(); document.getElementById('create-screen').classList.remove('hidden'); }
    function showJoinScreen() { hideAll(); document.getElementById('join-screen').classList.remove('hidden'); socket.emit('getSessions'); }
    socket.on('sessionList', (list) => {
        const container = document.getElementById('sessions-list');
        container.innerHTML = list.map(s => `<div class="session-item" onclick="initiateJoin('${s.id}')"><span>${s.name}</span> <span class="join-badge">JOIN</span></div>`).join('');
    });
    function initiateJoin(id) { selectedSessionIdForJoin = id; document.getElementById('password-modal').style.display = 'flex'; }
    function submitJoin() { socket.emit('joinSession', { sessionId: selectedSessionIdForJoin, password: document.getElementById('join-pass-input').value }); document.getElementById('password-modal').style.display = 'none'; }
    function showLandingScreen() { hideAll(); document.getElementById('landing-screen').classList.remove('hidden'); }
</script>
</body>
</html>
