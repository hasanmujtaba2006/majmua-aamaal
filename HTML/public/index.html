<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khatme Qadirya</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Gulzar&display=swap" rel="stylesheet">
    <style>
        :root { --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364); --gold: #FFD700; --glass: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-gradient); color: white; margin: 0; text-align: center; overflow-x: hidden; }
        .hidden { display: none !important; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; width: 90%; max-width: 450px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.1); }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin: 10px 0; font-size: 1rem; }
        .btn-primary { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-outline { background: none; border: 1px solid var(--gold); color: white; }
        .input-field { width: 85%; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: white; margin-bottom: 10px; text-align: center; }
        #admin-panel { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; stroke: var(--gold); }
    </style>
</head>
<body>

<div id="settings-badge" style="position:fixed; top:20px; right:20px; cursor:pointer; z-index:1000;" onclick="toggleModal('settings-modal', true)">⚙️</div>

<div id="landing-screen" class="glass-card">
    <h1 style="color:var(--gold);">Khatme Qadirya</h1>
    <button class="btn btn-primary" onclick="showScreen('create-screen')">CREATE GROUP</button>
    <button class="btn btn-outline" onclick="showScreen('join-screen')">JOIN GROUP</button>
</div>

<div id="create-screen" class="glass-card hidden">
    <h2>Create Group</h2>
    <input type="text" id="create-name" class="input-field" placeholder="Group Name">
    <input type="password" id="create-pass" class="input-field" placeholder="Password (Optional)">
    <button class="btn btn-primary" onclick="createSession()">START</button>
    <button class="btn btn-outline" onclick="showScreen('landing-screen')">BACK</button>
</div>

<div id="join-screen" class="glass-card hidden">
    <h2>Join Group</h2>
    <input type="text" id="join-pass" class="input-field" placeholder="Enter Password">
    <button class="btn btn-primary" onclick="joinSession()">JOIN NOW</button>
    <button class="btn btn-outline" onclick="showScreen('landing-screen')">BACK</button>
</div>

<div id="app-screen" class="glass-card hidden">
    <div id="zikr-title-urdu" style="font-family:'Gulzar'; font-size:2rem;"></div>
    <div id="zikr-body" style="font-size:1.5rem; margin:20px 0; direction:rtl;"></div>
    
    <div id="counter-box">
        <svg width="160" height="160"><circle class="progress-ring__circle" stroke-width="8" fill="transparent" r="70" cx="80" cy="80"/></svg>
        <h2 id="count-display" style="margin-top:-110px; font-size:3rem;">0</h2>
    </div>

    <button id="tap-btn" class="btn btn-primary" style="margin-top:60px;" onclick="handleTap()">TAP</button>

    <div id="admin-panel">
        <button class="btn btn-outline" onclick="socket.emit('nextZikr', currentSessionId)">NEXT</button>
        <button class="btn btn-outline" style="border-color:#ef4444;" onclick="socket.emit('endSession', currentSessionId)">END SESSION</button>
    </div>
</div>

<div id="settings-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div class="glass-card">
        <h3>Settings</h3>
        <button class="btn btn-outline" id="vib-toggle" onclick="toggleSetting('vib')">Vibration: ON</button>
        <button class="btn btn-outline" id="sound-toggle" onclick="toggleSetting('sound')">Sound: ON</button>
        <button class="btn btn-primary" onclick="toggleModal('settings-modal', false)">CLOSE</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentSessionId = null, isAdmin = false;
    let settings = { vib: true, sound: true };

    // 4. DEEP LINK FIX: Check URL on load
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('join')) {
            currentSessionId = params.get('join');
            showScreen('join-screen'); // Skip landing, go to password entry
        }
    };

    function showScreen(id) {
        ['landing-screen', 'create-screen', 'join-screen', 'app-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function createSession() {
        socket.emit('createSession', { name: document.getElementById('create-name').value, password: document.getElementById('create-pass').value });
    }

    function joinSession() {
        socket.emit('joinSession', { sessionId: currentSessionId || prompt("Enter Session ID"), password: document.getElementById('join-pass').value });
    }

    socket.on('joinedSession', (data) => {
        currentSessionId = data.sessionId;
        isAdmin = data.isAdmin;
        document.getElementById('admin-panel').style.display = isAdmin ? 'block' : 'none';
        showScreen('app-screen');
        updateUI(data.state);
    });

    socket.on('updateState', updateUI);

    // 2. END SESSION FIX: Redirect users home
    socket.on('forceExit', (msg) => {
        alert(msg);
        window.location.href = "/"; 
    });

    function updateUI(state) {
        document.getElementById('zikr-title-urdu').innerText = state.zikr.titleUrdu;
        document.getElementById('zikr-body').innerText = state.zikr.bodyText;
        document.getElementById('count-display').innerText = state.currentCount;
    }

    function handleTap() {
        if (settings.vib) navigator.vibrate(50);
        if (settings.sound) playBeep();
        socket.emit('increment', currentSessionId);
    }

    function toggleSetting(key) {
        settings[key] = !settings[key];
        document.getElementById(key + '-toggle').innerText = `${key.toUpperCase()}: ${settings[key] ? 'ON' : 'OFF'}`;
    }

    function toggleModal(id, show) {
        document.getElementById(id).classList.toggle('hidden', !show);
    }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }
</script>
</body>
</html>
