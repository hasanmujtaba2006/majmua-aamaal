<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatme Qadirya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Amiri+Quran&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
            --text-main: #ffffff;
            --text-muted: #cfcfcf;
            --btn-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        @font-face {
            font-family: 'MuhammadiQuranic Regular';
            src: url('MuhammadiQuranic.ttf') format('truetype');
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            
            /* FIX 2: Layout changed to allow scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0; /* Add padding so top/bottom isn't cut off when scrolling */
            box-sizing: border-box; 
            /* Removed 'overflow: hidden' to allow scrolling */
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 450px;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto; /* Helps with centering when zooming */
        }

        h1 { 
            margin: 0 0 20px 0; /* Added bottom margin since subtitle is gone */
            font-size: 1.5rem; 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* Subtitle CSS removed */

        /* ZIKR CONTAINER */
        #zikr-container {
            width: 100%;
            min-height: 150px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box; /* Ensures padding doesn't break width */
        }

        /* ARABIC TEXT */
        #arabic-text {
            font-family: 'MuhammadiQuranic Regular', 'Amiri Quran', serif;
            font-size: 2.2rem;
            line-height: 2.0;
            color: #ffffff;
            margin-bottom: 15px;
            direction: rtl;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            white-space: pre-line;
        }

        /* ROMAN TEXT */
        #roman-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            line-height: 1.5;
            color: var(--gold);
            font-weight: 400;
            white-space: pre-line;
        }

        /* PROGRESS RING */
        .progress-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            flex-shrink: 0; /* Prevents shrinking on small screens */
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .counter-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 700;
        }
        .target-label {
            position: absolute;
            bottom: 35px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #aaa;
        }

        /* BUTTON */
        #tap-btn {
            width: 100%;
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 239, 125, 0.2);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #tap-btn:active { transform: scale(0.96); }
        #tap-btn:disabled { background: #4b5563; box-shadow: none; }
        
        .pulsing { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 239, 125, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0); }
        }

        #status-msg { margin-top: 15px; height: 20px; font-size: 0.9rem; color: var(--gold); }

        /* ADMIN */
        #admin-panel { display: none; margin-top: 20px; width: 100%; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-controls { display: flex; gap: 10px; }
        .admin-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; }

    </style>
</head>
<body>

<div class="glass-card">
    <h1>Khatme Qadirya</h1>
    <div id="zikr-container">
        <div id="arabic-text">...</div>
        <div id="roman-text">Connecting...</div>
    </div>

    <div class="progress-container">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="70" cx="80" cy="80"/>
            <circle class="progress-ring__circle" stroke="#FFD700" stroke-width="8" stroke-linecap="round" fill="transparent" r="70" cx="80" cy="80"/>
        </svg>
        <div class="counter-text" id="count-display">0</div>
        <div class="target-label" id="target-display">Target: 111</div>
    </div>

    <button id="tap-btn" class="pulsing" onclick="handleUserTap()">TAP</button>
    <div id="status-msg"></div>

    <div id="admin-panel">
        <div class="admin-controls">
            <button class="admin-btn" style="color:#ff6b6b" onclick="resetCount()">Reset</button>
            <button class="admin-btn" style="color:#4ecdc4" onclick="nextZikr()">Next >></button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    // UI Elements
    const arabicText = document.getElementById('arabic-text');
    const romanText = document.getElementById('roman-text');
    const countDisplay = document.getElementById('count-display');
    const targetDisplay = document.getElementById('target-display');
    const tapBtn = document.getElementById('tap-btn');
    const statusMsg = document.getElementById('status-msg');
    const adminPanel = document.getElementById('admin-panel');

    // Progress Ring Logic
    const circle = document.querySelector('.progress-ring__circle');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    function setProgress(current, target) {
        if(target <= 0) {
            circle.style.strokeDashoffset = 0; 
            return;
        }
        const percent = Math.min(current / target, 1);
        const offset = circumference - percent * circumference;
        circle.style.strokeDashoffset = offset;
    }

    // Audio & Vibration
    let audioCtx = null;
    let hasBeeped = false;

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'complete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        } catch(e){}
    }

    function handleUserTap() {
        initAudio();
        socket.emit('increment');
        if (navigator.vibrate) navigator.vibrate(15);
        playSound('tap');
    }

    // --- Socket Handling ---
    socket.on('updateState', (data) => {
        if (data.zikr) {
            arabicText.innerText = data.zikr.arabic;
            romanText.innerText = data.zikr.roman;
            targetDisplay.innerText = "Target: " + data.target;
        }
        
        countDisplay.innerText = data.currentCount;
        setProgress(data.currentCount, data.target);

        // Finished State
        if (data.isFinished) {
            tapBtn.disabled = true;
            tapBtn.innerText = "COMPLETED";
            tapBtn.classList.remove('pulsing');
            tapBtn.style.background = "#4b5563";
            statusMsg.innerText = "Target Reached! Waiting for Admin...";
            
            if (!hasBeeped) {
                initAudio();
                playSound('complete');
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                hasBeeped = true;
            }
        } else {
            tapBtn.disabled = false;
            if (data.target === 1) {
                tapBtn.innerText = "DONE";
            } else {
                tapBtn.innerText = "TAP";
            }
            tapBtn.classList.add('pulsing');
            tapBtn.style.background = "var(--btn-gradient)";
            statusMsg.innerText = "";
            hasBeeped = false;
        }
    });

    socket.on('sessionComplete', (msg) => {
        arabicText.innerText = "الْحَمْدُ لِلَّٰهِ";
        romanText.innerText = msg;
        countDisplay.innerText = "✓";
        circle.style.strokeDashoffset = 0;
        tapBtn.style.display = 'none';
        statusMsg.innerText = "Session Closed.";
        playSound('complete');
    });

    // --- Admin ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
        adminPanel.style.display = 'block';
    }

    function resetCount() { if(confirm("Reset this counter?")) socket.emit('resetCurrent'); }
    function nextZikr() { if(confirm("Move to next Zikr?")) socket.emit('nextZikr'); }

    // Initial Unlock
    document.body.addEventListener('click', initAudio, { once: true });
    document.body.addEventListener('touchstart', initAudio, { once: true });

</script>

</body>
</html>
