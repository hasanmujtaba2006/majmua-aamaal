<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatme Qadirya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Gulzar&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
            --text-main: #ffffff;
            --text-muted: #cfcfcf;
            --btn-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --special-bg: rgba(255, 215, 0, 0.1);
        }

        /* 1. Custom Arabic Font (If uploaded) */
        @font-face {
            font-family: 'Al Qalam Quran';
            src: url('Al Qalam Quran Majeed Web Regular.ttf') format('truetype');
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            display: block;
            padding: 20px 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 500px;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            margin: 30px auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0 0 25px 0; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        /* HEADER SECTION */
        .zikr-header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Number Badge */
        .zikr-badge {
            background: var(--gold);
            color: #0F2027;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Al Qalam Quran', serif;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: -25px; /* Overlap with box */
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 3px solid #0F2027;
        }

        /* NEW TITLE BOX STYLE */
        .title-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3); /* Subtle Gold Border */
            border-radius: 20px;
            padding: 30px 20px 15px 20px; /* Top padding for badge overlap */
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }

        /* URDU TITLE FONT: GULZAR */
        .zikr-title {
            font-family: 'Gulzar', serif; /* Best web font for titles */
            font-size: 2.0rem; /* Large size */
            color: #ffffff;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .zikr-subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* BODY SECTION */
        #zikr-body-container {
            width: 100%;
            min-height: 100px;
            margin-bottom: 20px;
            padding: 10px;
        }

        #arabic-body {
            font-family: 'Al Qalam Quran', serif; 
            font-size: 2.6rem;
            line-height: 1.6;
            color: #ffffff;
            margin-bottom: 15px;
            direction: rtl;
            white-space: pre-line;
        }

        /* For Urdu Body text (Istighasah lines) */
        .urdu-font {
            font-family: 'Gulzar', serif !important;
            font-size: 1.8rem !important;
            line-height: 2.0 !important;
        }

        #roman-body {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.5;
            white-space: pre-line;
            font-style: italic;
        }

        .special-mode .title-box {
            background: var(--special-bg);
            border: 2px solid var(--gold);
        }

        /* PROGRESS RING */
        .progress-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            flex-shrink: 0;
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .counter-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 700;
        }
        .target-label {
            position: absolute;
            bottom: 35px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #aaa;
        }

        /* BUTTON */
        #tap-btn {
            width: 100%;
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 239, 125, 0.2);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: 20px;
        }
        #tap-btn:active { transform: scale(0.96); }
        #tap-btn:disabled { background: #4b5563; box-shadow: none; }
        .pulsing { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 239, 125, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0); }
        }

        #status-msg { margin-top: 15px; min-height: 30px; font-size: 1.1rem; font-weight: bold; color: var(--gold); }

        #admin-panel { display: none; margin-top: 20px; width: 100%; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .admin-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: bold; min-width: 120px; }
        .btn-restart { background: #ff9f43 !important; color: #fff !important; width: 100%; flex: 100%; margin-top: 10px; }

    </style>
</head>
<body>

<div class="glass-card" id="main-card">
    <h1>Khatme Qadirya</h1>

    <div class="zikr-header">
        <div class="zikr-badge" id="zikr-num">1</div>
        
        <div class="title-box">
            <div class="zikr-title" id="zikr-title-urdu">Loading...</div>
            <div class="zikr-subtitle" id="zikr-title-eng">Connecting</div>
        </div>
    </div>

    <div id="zikr-body-container">
        <div id="arabic-body">...</div>
        <div id="roman-body">...</div>
    </div>

    <div class="progress-container" id="progress-wrapper">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="70" cx="80" cy="80"/>
            <circle class="progress-ring__circle" stroke="#FFD700" stroke-width="8" stroke-linecap="round" fill="transparent" r="70" cx="80" cy="80"/>
        </svg>
        <div class="counter-text" id="count-display">0</div>
        <div class="target-label" id="target-display">Target: 111</div>
    </div>

    <button id="tap-btn" class="pulsing" onclick="handleUserTap()">TAP</button>
    <div id="status-msg"></div>

    <div id="admin-panel">
        <div class="admin-controls">
            <button class="admin-btn" style="color:#ff6b6b" onclick="resetCount()">Reset Count</button>
            <button class="admin-btn" style="color:#4ecdc4" onclick="nextZikr()">Next >></button>
            <button class="admin-btn btn-restart" onclick="restartSession()">↻ Restart Session</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    // UI Elements
    const mainCard = document.getElementById('main-card');
    const zikrNum = document.getElementById('zikr-num');
    const titleUrdu = document.getElementById('zikr-title-urdu');
    const titleEng = document.getElementById('zikr-title-eng');
    const arabicBody = document.getElementById('arabic-body');
    const romanBody = document.getElementById('roman-body');
    const countDisplay = document.getElementById('count-display');
    const targetDisplay = document.getElementById('target-display');
    const progressWrapper = document.getElementById('progress-wrapper');
    const tapBtn = document.getElementById('tap-btn');
    const statusMsg = document.getElementById('status-msg');
    const adminPanel = document.getElementById('admin-panel');

    const circle = document.querySelector('.progress-ring__circle');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    function setProgress(current, target) {
        if(target <= 0) { circle.style.strokeDashoffset = 0; return; }
        const percent = Math.min(current / target, 1);
        const offset = circumference - percent * circumference;
        circle.style.strokeDashoffset = offset;
    }

    let audioCtx = null;
    let hasBeeped = false;

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tap') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'complete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        } catch(e){}
    }

    function handleUserTap() {
        initAudio();
        socket.emit('increment');
        if (navigator.vibrate) navigator.vibrate(15);
        playSound('tap');
    }

    // --- SOCKET LOGIC ---
    socket.on('updateState', (data) => {
        if (data.zikr) {
            zikrNum.innerText = data.zikr.id;
            titleUrdu.innerText = data.zikr.titleUrdu;
            titleEng.innerText = data.zikr.titleEng;
            arabicBody.innerText = data.zikr.bodyText;
            romanBody.innerText = data.zikr.bodyRoman;
            targetDisplay.innerText = "Target: " + data.target;

            // Apply 'Gulzar' Font if marked as Urdu body
            if (data.zikr.isUrduBody) {
                arabicBody.classList.add('urdu-font');
            } else {
                arabicBody.classList.remove('urdu-font');
            }

            if (data.zikr.type === 'instruction') {
                mainCard.classList.add('special-mode');
                progressWrapper.style.display = 'none';
            } else {
                mainCard.classList.remove('special-mode');
                progressWrapper.style.display = 'block';
            }
        }
        
        countDisplay.innerText = data.currentCount;
        setProgress(data.currentCount, data.target);

        if (data.isFinished) {
            tapBtn.disabled = true;
            tapBtn.innerText = "COMPLETED";
            tapBtn.classList.remove('pulsing');
            tapBtn.style.background = "#4b5563";
            statusMsg.innerText = "Target Reached! Waiting for Admin...";
            
            if (!hasBeeped) {
                initAudio();
                playSound('complete');
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                hasBeeped = true;
            }
        } else {
            tapBtn.disabled = false;
            if (data.target === 1) tapBtn.innerText = "DONE / NEXT";
            else tapBtn.innerText = "TAP";
            tapBtn.style.display = 'block';
            tapBtn.classList.add('pulsing');
            tapBtn.style.background = "var(--btn-gradient)";
            statusMsg.innerText = "";
            hasBeeped = false;
        }
    });

    socket.on('sessionComplete', (msg) => {
        titleUrdu.innerText = "ختمِ قادریہ مکمل";
        titleEng.innerText = "Session Closed";
        arabicBody.innerText = "الْحَمْدُ لِلَّٰهِ";
        romanBody.innerText = "";
        progressWrapper.style.display = 'block'; 
        countDisplay.innerText = "✓";
        tapBtn.style.display = 'none';
        
        statusMsg.innerText = msg; 
        statusMsg.style.color = "#38ef7d";
        
        playSound('complete');
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
        adminPanel.style.display = 'block';
    }

    function resetCount() { if(confirm("Reset this counter?")) socket.emit('resetCurrent'); }
    function nextZikr() { if(confirm("Move to next Zikr?")) socket.emit('nextZikr'); }
    function restartSession() { if(confirm("Restart the ENTIRE session?")) socket.emit('restartSession'); }

    document.body.addEventListener('click', initAudio, { once: true });
    document.body.addEventListener('touchstart', initAudio, { once: true });

</script>

</body>
</html>
