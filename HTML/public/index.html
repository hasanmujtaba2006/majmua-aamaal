<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khatme Qadirya</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --btn-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Glass Card Container */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 85%;
            max-width: 400px;
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Zikr Display Box */
        #zikr-display {
            background: rgba(0, 0, 0, 0.3);
            color: var(--gold);
            padding: 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Circular Progress Counter */
        .progress-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px auto;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .counter-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Modern Tap Button */
        #tap-btn {
            width: 100%;
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 22px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(56, 239, 125, 0.3);
            transition: transform 0.1s, box-shadow 0.2s;
            outline: none;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pulse Animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 239, 125, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0); }
        }
        
        #tap-btn.pulsing {
            animation: pulse 2s infinite;
        }

        #tap-btn:active {
            transform: scale(0.96);
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.2);
        }

        #tap-btn:disabled {
            background: #4b5563;
            box-shadow: none;
            cursor: not-allowed;
            animation: none;
        }

        #status-msg {
            height: 20px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--gold);
        }

        /* Admin Controls */
        #admin-panel {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .admin-controls {
            display: flex;
            gap: 15px;
        }

        .admin-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .admin-btn:hover { background: rgba(255,255,255,0.2); }

    </style>
</head>
<body>

<div class="glass-card">
    <h1>Khatme Qadirya</h1>
    <div class="subtitle">Live Sync Counter</div>
    
    <div id="zikr-display">Connecting...</div>
    
    <div class="progress-container">
        <svg class="progress-ring" width="180" height="180">
            <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="80" cx="90" cy="90"/>
            <circle class="progress-ring__circle" stroke="#FFD700" stroke-width="8" stroke-linecap="round" fill="transparent" r="80" cx="90" cy="90"/>
        </svg>
        <div class="counter-text" id="count-display">0</div>
    </div>
    
    <button id="tap-btn" class="pulsing" onclick="handleUserTap()">TAP</button>
    <div id="status-msg"></div>

    <div id="admin-panel">
        <div style="font-size:0.75rem; color:#888; margin-bottom:10px; text-transform:uppercase;">Admin Controls</div>
        <div class="admin-controls">
            <button class="admin-btn" style="color:#ff6b6b" onclick="resetCount()">Reset</button>
            <button class="admin-btn" style="color:#4ecdc4" onclick="nextZikr()">Next Zikr</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    // UI Elements
    const tapBtn = document.getElementById('tap-btn');
    const countDisplay = document.getElementById('count-display');
    const zikrDisplay = document.getElementById('zikr-display');
    const statusMsg = document.getElementById('status-msg');
    const adminPanel = document.getElementById('admin-panel');
    
    // Progress Ring Setup
    const circle = document.querySelector('.progress-ring__circle');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    function setProgress(current, target) {
        if(target === 0) return;
        const percent = current / target;
        const offset = circumference - percent * circumference;
        circle.style.strokeDashoffset = offset;
    }

    // Sound & Vibration State
    let audioCtx = null;
    let hasBeeped = false; 

    // 1. Initialize Audio (Must happen on first interaction)
    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 2. Play Sound
    function playSound(type) {
        if (!audioCtx) return;
        
        try {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'tap') {
                // Gentle Click
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'complete') {
                // Success Chord
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C
                oscillator.frequency.linearRampToValueAtTime(659.25, audioCtx.currentTime + 0.1); // E
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1);
            }
        } catch(e) { console.log(e); }
    }

    // 3. Vibration
    function vibratePhone(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // --- Interaction Handler ---
    function handleUserTap() {
        initAudio(); // Unlock audio
        socket.emit('increment');
        
        // Instant feedback
        vibratePhone(15); // Tiny vibration
        playSound('tap');
    }

    // --- Socket Updates ---
    socket.on('updateState', (data) => {
        zikrDisplay.innerText = data.zikrText;
        countDisplay.innerText = data.currentCount;
        
        // Update Ring
        setProgress(data.currentCount, data.target);
        
        if (data.isFinished) {
            // FINISHED
            tapBtn.disabled = true;
            tapBtn.innerText = "COMPLETED";
            tapBtn.classList.remove('pulsing');
            tapBtn.style.background = "#4b5563"; // Grey
            statusMsg.innerText = "Target Reached! Waiting for Admin...";
            
            if (!hasBeeped) {
                initAudio();
                playSound('complete');
                vibratePhone([200, 100, 200, 100, 500]); // Heavy Vibration
                hasBeeped = true;
            }
        } else {
            // ACTIVE
            tapBtn.disabled = false;
            tapBtn.innerText = "TAP";
            tapBtn.classList.add('pulsing');
            tapBtn.style.background = "var(--btn-gradient)";
            statusMsg.innerText = "";
            hasBeeped = false;
        }
    });

    socket.on('sessionComplete', (msg) => {
        zikrDisplay.innerText = msg;
        countDisplay.innerText = "✓";
        circle.style.strokeDashoffset = 0; // Full circle
        tapBtn.style.display = 'none';
        statusMsg.innerText = "Khatm Completed.";
        playSound('complete');
    });

    // --- Admin Setup ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
        adminPanel.style.display = 'block';
    }

    function resetCount() {
        if(confirm("Reset counter?")) socket.emit('resetCurrent');
    }

    function nextZikr() {
        if(confirm("Start Next Zikr?")) socket.emit('nextZikr');
    }

    // Global Unlock Listeners
    document.body.addEventListener('touchstart', initAudio, { once: true });
    document.body.addEventListener('click', initAudio, { once: true });
</script>

</body>
</html>
