<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatme Qadirya</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Gulzar&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #0F2027, #203A43, #2C5364);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #FFD700;
            --text-main: #ffffff;
            --text-muted: #cfcfcf;
            --btn-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --danger: #ef4444;
            --special-bg: rgba(255, 215, 0, 0.1);
        }

        /* 1. ARABIC FONT */
        @font-face { 
            font-family: 'Al Qalam Quran'; 
            src: url('Al Qalam Quran Majeed Web Regular.ttf') format('truetype'); 
        }
        
        /* 2. URDU FONT (KASHEEDA) */
        @font-face { 
            font-family: 'Jameel Noori Nastaleeq Kasheeda'; 
            src: url('Jameel Noori Nastaleeq Kasheeda.ttf') format('truetype'); 
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            display: block;
            padding: 20px 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .hidden { display: none !important; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            margin: 20px auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* STATUS INDICATOR */
        #connection-status {
            position: absolute; top: 15px; right: 15px;
            width: 12px; height: 12px; border-radius: 50%;
            background: #4b5563;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }
        .status-online { background: #38ef7d !important; box-shadow: 0 0 10px #38ef7d !important; }

        h1 { margin: 0 0 30px 0; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        /* LOBBY */
        input[type="text"] {
            width: 80%; padding: 15px; border-radius: 15px; border: 1px solid var(--gold);
            background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; text-align: center; margin-bottom: 15px;
        }
        .session-list { width: 100%; margin-top: 20px; text-align: left; }
        .session-item {
            background: rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent;
        }
        .session-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.15); }
        .join-badge { background: var(--btn-gradient); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        /* ZIKR UI */
        .zikr-header { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .zikr-badge {
            background: var(--gold); color: #0F2027; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-family: 'Al Qalam Quran', serif; font-size: 1.6rem; font-weight: bold;
            margin-bottom: -22px; z-index: 10; border: 3px solid #0F2027;
        }
        .title-box {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px;
            padding: 30px 20px 15px 20px; width: 100%; position: relative;
        }
        .zikr-title { font-family: 'Gulzar', serif; font-size: 2.0rem; color: #ffffff; line-height: 1.6; margin-bottom: 5px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .zikr-subtitle { font-family: 'Outfit', sans-serif; font-size: 0.9rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        #zikr-body-container { width: 100%; min-height: 100px; margin-bottom: 20px; padding: 10px; }
        
        #arabic-body {
            font-family: 'Al Qalam Quran', serif; font-size: 2.6rem; line-height: 1.6;
            color: #ffffff; margin-bottom: 15px; direction: rtl; white-space: pre-line;
        }
        
        /* UPDATED: Uses Kasheeda Font */
        .urdu-font { 
            font-family: 'Jameel Noori Nastaleeq Kasheeda', serif !important; 
            font-size: 2.0rem !important; 
            line-height: 2.2 !important; 
        }
        
        #roman-body { font-family: 'Outfit', sans-serif; font-size: 1.1rem; color: #e0e0e0; line-height: 1.5; white-space: pre-line; font-style: italic; }
        .special-mode .title-box { background: var(--special-bg); border: 2px solid var(--gold); }

        .progress-container { position: relative; width: 160px; height: 160px; margin-bottom: 25px; flex-shrink: 0; }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .counter-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; font-weight: 700; }
        .target-label { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; color: #aaa; }

        #tap-btn {
            width: 100%; background: var(--btn-gradient); color: white; border: none; padding: 20px;
            font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(56, 239, 125, 0.2); transition: transform 0.1s;
        }
        #tap-btn:active { transform: scale(0.96); }
        #tap-btn:disabled { background: #4b5563; box-shadow: none; }
        
        #start-session-btn {
            width: 100%; background: var(--btn-gradient); padding: 15px;
            font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; border: none; color: white;
        }

        .pulsing { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(56, 239, 125, 0); } 100% { box-shadow: 0 0 0 0 rgba(56, 239, 125, 0); } }

        #status-msg { margin-top: 15px; min-height: 30px; font-size: 1.1rem; font-weight: bold; color: var(--gold); }

        #admin-panel { display: none; margin-top: 20px; width: 100%; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .admin-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: bold; min-width: 120px; }
        .btn-restart { background: #ff9f43 !important; color: #fff !important; width: 100%; flex: 100%; margin-top: 10px; }
        .btn-end { background: var(--danger) !important; color: #fff !important; width: 100%; flex: 100%; margin-top: 5px; }

        /* MODAL */
        #custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1a262f; border: 1px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px;
        }
        .modal-buttons { margin-top: 20px; display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .modal-confirm { background: var(--gold); color: #000; }
        .modal-cancel { background: #4b5563; color: white; }

    </style>
</head>
<body>

<div class="glass-card" id="lobby-screen">
    <h1>Khatme Qadirya</h1>
    <div id="connection-status"></div>
    
    <div id="admin-create-section" class="hidden">
        <p style="color:#ccc; margin-bottom:10px;">Admin Mode</p>
        <input type="text" id="session-name-input" placeholder="Name Your Session..." />
        <button id="start-session-btn" onclick="createSession()">START SESSION</button>
    </div>

    <div id="reciter-join-section">
        <p style="color:#ccc; margin-bottom:10px;">Join a Live Session</p>
        <div id="sessions-list" class="session-list">
            <div style="color:#666;">Searching for sessions...</div>
        </div>
    </div>
</div>

<div class="glass-card hidden" id="app-screen">
    <div id="connection-status" class="status-online"></div>
    <div style="font-size:0.8rem; color:#aaa; margin-bottom:10px;" id="session-title-display"></div>
    <h1>Khatme Qadirya</h1>

    <div class="zikr-header">
        <div class="zikr-badge" id="zikr-num">1</div>
        <div class="title-box">
            <div class="zikr-title" id="zikr-title-urdu">Loading...</div>
            <div class="zikr-subtitle" id="zikr-title-eng">Connecting</div>
        </div>
    </div>

    <div id="zikr-body-container">
        <div id="arabic-body">...</div>
        <div id="roman-body">...</div>
    </div>

    <div class="progress-container" id="progress-wrapper">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__bg" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="70" cx="80" cy="80"/>
            <circle class="progress-ring__circle" stroke="#FFD700" stroke-width="8" stroke-linecap="round" fill="transparent" r="70" cx="80" cy="80"/>
        </svg>
        <div class="counter-text" id="count-display">0</div>
        <div class="target-label" id="target-display">Target: 111</div>
    </div>

    <button id="tap-btn" class="pulsing" onclick="handleUserTap()">TAP</button>
    <div id="status-msg"></div>

    <div id="admin-panel">
        <div class="admin-controls">
            <button class="admin-btn" style="color:#ff6b6b" onclick="showModal('reset')">Reset</button>
            <button class="admin-btn" style="color:#4ecdc4" onclick="showModal('next')">Next >></button>
            <button class="admin-btn btn-restart" onclick="showModal('restart')">Restart</button>
            <button class="admin-btn btn-end" onclick="showModal('end')">End Session</button>
        </div>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <h3 id="modal-text" style="color:white; margin-top:0;">Confirm?</h3>
        <div class="modal-buttons">
            <button class="modal-btn modal-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn modal-confirm" id="modal-confirm-btn">Yes</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>
    const socket = io();
    let currentSessionId = null;
    let pendingAction = null;

    const lobbyScreen = document.getElementById('lobby-screen');
    const appScreen = document.getElementById('app-screen');
    const adminSection = document.getElementById('admin-create-section');
    const reciterSection = document.getElementById('reciter-join-section');
    const sessionsList = document.getElementById('sessions-list');
    const sessionNameInput = document.getElementById('session-name-input');
    const sessionTitleDisplay = document.getElementById('session-title-display');
    const statusDots = document.querySelectorAll('#connection-status');

    const zikrNum = document.getElementById('zikr-num');
    const titleUrdu = document.getElementById('zikr-title-urdu');
    const titleEng = document.getElementById('zikr-title-eng');
    const arabicBody = document.getElementById('arabic-body');
    const romanBody = document.getElementById('roman-body');
    const countDisplay = document.getElementById('count-display');
    const targetDisplay = document.getElementById('target-display');
    const progressWrapper = document.getElementById('progress-wrapper');
    const tapBtn = document.getElementById('tap-btn');
    const statusMsg = document.getElementById('status-msg');
    const adminPanel = document.getElementById('admin-panel');
    const mainCard = document.getElementById('app-screen'); 

    const circle = document.querySelector('.progress-ring__circle');
    const radius = circle.r.baseVal.value;
    const circumference = radius * 2 * Math.PI;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    socket.on('connect', () => {
        statusDots.forEach(dot => dot.classList.add('status-online'));
        if (currentSessionId) {
            console.log("Reconnecting...");
            socket.emit('reJoinSession', currentSessionId);
        }
    });

    socket.on('disconnect', () => {
        statusDots.forEach(dot => dot.classList.remove('status-online'));
    });

    socket.on('forceExit', (msg) => {
        alert(msg);
        location.reload();
    });

    socket.on('sessionError', (msg) => {
        console.error(msg); 
        if(currentSessionId) {
            alert(msg);
            location.reload();
        }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.has('admin');

    if (isAdmin) {
        adminSection.classList.remove('hidden');
        reciterSection.classList.add('hidden');
    } else {
        adminSection.classList.add('hidden');
        reciterSection.classList.remove('hidden');
    }

    socket.on('sessionList', (sessions) => {
        sessionsList.innerHTML = "";
        if (sessions.length === 0) {
            sessionsList.innerHTML = "<div style='color:#999; margin-top:10px;'>No active sessions.<br>Waiting for Admin to start...</div>";
            return;
        }
        sessions.forEach(s => {
            const div = document.createElement('div');
            div.className = 'session-item';
            div.innerHTML = `<span class="session-name">${s.name}</span><span class="join-badge">JOIN</span>`;
            div.onclick = () => socket.emit('joinSession', s.id);
            sessionsList.appendChild(div);
        });
    });

    socket.on('joinedSession', (data) => {
        currentSessionId = data.sessionId;
        lobbyScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        sessionTitleDisplay.innerText = "Session: " + data.state.sessionName;
        if (data.isAdmin) adminPanel.style.display = 'block';
        updateUI(data.state);
    });

    function createSession() {
        const name = sessionNameInput.value.trim() || "Khatm Session";
        socket.emit('createSession', name);
    }

    function updateUI(data) {
        if (data.zikr) {
            zikrNum.innerText = data.zikr.id;
            titleUrdu.innerText = data.zikr.titleUrdu;
            titleEng.innerText = data.zikr.titleEng;
            arabicBody.innerText = data.zikr.bodyText;
            romanBody.innerText = data.zikr.bodyRoman;
            targetDisplay.innerText = "Target: " + data.target;

            if (data.zikr.isUrduBody) {
                arabicBody.classList.add('urdu-font');
            } else {
                arabicBody.classList.remove('urdu-font');
            }

            if (data.zikr.type === 'instruction') {
                mainCard.classList.add('special-mode');
                progressWrapper.style.display = 'none';
            } else {
                mainCard.classList.remove('special-mode');
                progressWrapper.style.display = 'block';
            }
        }
        
        countDisplay.innerText = data.currentCount;
        
        if(data.target <= 0) { 
            circle.style.strokeDashoffset = 0; 
        } else {
            const percent = Math.min(data.currentCount / data.target, 1);
            const offset = circumference - percent * circumference;
            circle.style.strokeDashoffset = offset;
        }

        if (data.isFinished) {
            tapBtn.disabled = true;
            // UPDATED LOGIC HERE
            if (data.isLast) {
                tapBtn.innerText = "COMPLETED";
            } else {
                tapBtn.innerText = "Next Zikr";
            }
            
            tapBtn.classList.remove('pulsing');
            tapBtn.style.background = "#4b5563";
            statusMsg.innerText = "Target Reached! Waiting for Admin...";
            
            if (!hasBeeped) {
                initAudio();
                playSound();
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                hasBeeped = true;
            }
        } else {
            tapBtn.disabled = false;
            if (data.target === 1) tapBtn.innerText = "DONE / NEXT";
            else tapBtn.innerText = "TAP";
            
            tapBtn.style.display = 'block';
            tapBtn.classList.add('pulsing');
            tapBtn.style.background = "var(--btn-gradient)";
            statusMsg.innerText = "";
            hasBeeped = false;
        }
    }

    socket.on('updateState', updateUI);

    socket.on('sessionComplete', (msg) => {
        titleUrdu.innerText = "ختمِ قادریہ مکمل";
        titleEng.innerText = "Session Closed";
        arabicBody.innerText = "الْحَمْدُ لِلَّٰهِ";
        romanBody.innerText = "";
        progressWrapper.style.display = 'block'; 
        countDisplay.innerText = "✓";
        tapBtn.style.display = 'none';
        statusMsg.innerText = msg; 
        statusMsg.style.color = "#38ef7d";
        playSound();
    });

    function handleUserTap() {
        if(!currentSessionId) {
            alert("Connection lost. Reloading...");
            location.reload();
            return;
        }
        initAudio();
        socket.emit('increment', currentSessionId);
        
        if (navigator.vibrate) navigator.vibrate(15);
        playSound();
    }

    const modal = document.getElementById('custom-modal');
    const modalText = document.getElementById('modal-text');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');

    function showModal(action) {
        pendingAction = action;
        modal.style.display = 'flex';
        if (action === 'reset') modalText.innerText = "Reset current count to 0?";
        else if (action === 'next') modalText.innerText = "Move to Next Zikr?";
        else if (action === 'restart') modalText.innerText = "Restart ENTIRE session?";
        else if (action === 'end') modalText.innerText = "End and Delete this session?";
    }

    function closeModal() { modal.style.display = 'none'; pendingAction = null; }

    modalConfirmBtn.onclick = function() {
        if (!currentSessionId) return;
        if (pendingAction === 'reset') socket.emit('resetCurrent', currentSessionId);
        else if (pendingAction === 'next') socket.emit('nextZikr', currentSessionId);
        else if (pendingAction === 'restart') socket.emit('restartSession', currentSessionId);
        else if (pendingAction === 'end') socket.emit('endSession', currentSessionId);
        closeModal();
    };

    let audioCtx = null;
    let hasBeeped = false;

    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound() {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } catch(e){}
    }

    document.body.addEventListener('click', initAudio, { once: true });
    document.body.addEventListener('touchstart', initAudio, { once: true });

</script>

</body>
</html>
