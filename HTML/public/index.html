<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khatme Qadirya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #04472e; /* Deep Islamic Green */
            --accent: #d4af37;  /* Gold */
            --bg: #f3f4f6;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #04472e 0%, #066045 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            overflow: hidden; /* Prevent scroll on tap */
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 450px;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
        }

        /* Gold Border Top */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 6px;
            background: var(--accent);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 25px;
        }

        #zikr-display {
            background: #e8f5e9;
            color: var(--primary);
            padding: 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(4, 71, 46, 0.1);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Progress Circle Wrapper */
        .counter-wrapper {
            position: relative;
            margin: 20px auto;
            width: 120px;
            height: 120px;
        }

        #count-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 120px;
        }

        .target-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* The Big Tap Button */
        #tap-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #066045 100%);
            color: var(--white);
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(4, 71, 46, 0.3);
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #tap-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(4, 71, 46, 0.2);
        }

        #tap-btn:disabled {
            background: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        #status-msg {
            height: 20px;
            margin-top: 15px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* Admin Section */
        #admin-panel {
            display: none;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }
        
        .admin-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .admin-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-reset { background: #fee2e2; color: var(--danger); }
        .btn-next { background: #d1fae5; color: var(--success); }

    </style>
</head>
<body>

<div class="container">
    <h1>Khatme Qadirya</h1>
    <div class="subtitle">Live Global Counter</div>
    
    <div id="zikr-display">Connecting...</div>
    
    <div class="counter-wrapper">
        <div id="count-display">0</div>
    </div>
    <div class="target-label">Target: 111</div>
    
    <button id="tap-btn" onclick="handleUserTap()">TAP TO COUNT</button>
    <div id="status-msg"></div>

    <div id="admin-panel">
        <div style="font-size:0.8rem; color:#888; margin-bottom:10px;">ADMIN CONTROLS</div>
        <div class="admin-controls">
            <button class="admin-btn btn-reset" onclick="resetCount()">Reset</button>
            <button class="admin-btn btn-next" onclick="nextZikr()">Next Zikr</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    
    // UI Elements
    const tapBtn = document.getElementById('tap-btn');
    const countDisplay = document.getElementById('count-display');
    const zikrDisplay = document.getElementById('zikr-display');
    const statusMsg = document.getElementById('status-msg');
    const adminPanel = document.getElementById('admin-panel');

    // State for local audio/vibe handling
    let audioCtx = null;
    let hasBeeped = false; // Prevents beep loop

    // 1. Setup Audio Context (Must be unlocked by user first)
    function initAudio() {
        if (!audioCtx) {
            // Create Context
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                audioCtx = new AudioContext();
            }
        }
        // Resume if suspended (browser requirement)
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 2. Play Beep Function
    function playBeep(type = 'normal') {
        if (!audioCtx) return;

        try {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'complete') {
                // Success Sound: Higher pitch, longer
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.8);
            } else {
                // Tap Sound: Short, subtle click
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            }
        } catch (e) {
            console.error("Audio error:", e);
        }
    }

    // 3. Vibration Function
    function triggerVibration(pattern) {
        if (navigator.vibrate) {
            navigator.vibrate(pattern);
        }
    }

    // --- MAIN ACTION HANDLER ---
    function handleUserTap() {
        // Unlock audio on first tap (CRITICAL FIX)
        initAudio();

        // Send data
        socket.emit('increment');

        // Instant feedback (Optional: plays local click sound)
        // playBeep('normal'); // Uncomment if you want sound on every tap
        triggerVibration(40); // Light vibration on tap
    }

    // --- SOCKET LOGIC ---
    socket.on('updateState', (data) => {
        zikrDisplay.innerText = data.zikrText;
        countDisplay.innerText = data.currentCount;
        
        if (data.isFinished) {
            // TARGET REACHED
            tapBtn.disabled = true;
            tapBtn.innerText = "ALHAMDULILLAH";
            tapBtn.style.background = "#d4af37"; // Gold color
            statusMsg.innerText = "Target Reached! Waiting for Admin...";
            
            // Play Completion Sound & Vibrate
            if (!hasBeeped) {
                // Ensure audio is ready even if this is a passive client
                initAudio(); 
                playBeep('complete');
                triggerVibration([200, 100, 200]); // Vibrate-Pause-Vibrate
                hasBeeped = true;
            }
        } else {
            // IN PROGRESS
            tapBtn.disabled = false;
            tapBtn.innerText = "TAP TO COUNT";
            tapBtn.style.background = "linear-gradient(135deg, var(--primary) 0%, #066045 100%)";
            statusMsg.innerText = "";
            hasBeeped = false;
        }
    });

    socket.on('sessionComplete', (msg) => {
        zikrDisplay.innerText = msg;
        countDisplay.innerText = "✓";
        tapBtn.style.display = 'none';
        statusMsg.innerText = "Khatm Completed.";
        playBeep('complete');
    });

    // --- ADMIN PANEL ---
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
        adminPanel.style.display = 'block';
    }

    function resetCount() {
        if(confirm("Reset count to 0?")) socket.emit('resetCurrent');
    }

    function nextZikr() {
        if(confirm("Start next Zikr?")) socket.emit('nextZikr');
    }
    
    // Attempt to unlock audio on any touch (for reliability)
    document.addEventListener('touchstart', initAudio, { once: true });
    document.addEventListener('click', initAudio, { once: true });

</script>

</body>
</html>
